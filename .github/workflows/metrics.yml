name: Generate Metrics SVG

on:
  schedule:
    - cron: "0 1 * * *"  # daily at 01:00 UTC (offset from breakout)
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/metrics.yml

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate metrics SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Sheriffelrefaey
          filename: github-metrics.svg
          template: classic
          base: header, metadata
          config_timezone: Europe/London
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          output_action: none

      - name: Copy SVG to repo root and strip 'Followed by' line
        run: |
          # Find the generated SVG from the action's output dir
          if [ -f /metrics_renders/github-metrics.svg ]; then
            cp /metrics_renders/github-metrics.svg github-metrics.svg
          else
            # Fall back to find
            find / -name 'github-metrics.svg' -not -path '/proc/*' 2>/dev/null | head -1 | xargs -I{} cp {} github-metrics.svg
          fi
          python3 <<'PY'
          import re
          with open('github-metrics.svg') as f:
              s = f.read()
          pat = re.compile(r'\s*<div class="field"[^>]*>(?:(?!</div>).)*?Followed by[^<]*</div>\s*', re.DOTALL)
          new = pat.sub('', s)
          if new == s:
              print('warning: Followed-by block not matched; SVG unchanged')
          else:
              with open('github-metrics.svg', 'w') as f:
                  f.write(new)
              print('removed Followed-by block')
          PY

      - name: Commit if changed
        run: |
          if ! git diff --quiet github-metrics.svg; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add github-metrics.svg
            git commit -m "chore: refresh github-metrics.svg"
            git push
          else
            echo "no changes"
          fi
