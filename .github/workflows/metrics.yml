name: Generate Metrics SVG

on:
  schedule:
    - cron: "0 1 * * *"  # daily at 01:00 UTC (offset from breakout)
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/metrics.yml

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Stats card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: Sheriffelrefaey
          filename: github-metrics.svg
          template: classic
          base: header, metadata
          extras_css: |
            .row > section:first-child > .field:nth-child(2) { display: none !important; }
          config_timezone: Europe/London
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          output_action: commit
          committer_message: "chore: refresh github-metrics.svg"
